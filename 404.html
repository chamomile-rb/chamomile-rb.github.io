<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Chamomile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F33C;</text></svg>">
</head>
<body>
  <header class="hero" style="min-height: 100vh; display: flex; align-items: center;">
    <div class="container">
      <span class="hero-flower">&#x1F33C;</span>
      <h1 class="hero-title"><span class="hero-title-accent">404</span></h1>
      <p class="hero-subtitle">Page not found</p>
      <div class="hero-actions" style="margin-top: 32px;">
        <a href="/" class="btn btn-primary">Back to Home</a>
      </div>
    </div>
  </header>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</body>
</html>
